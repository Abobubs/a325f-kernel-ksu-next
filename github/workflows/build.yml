name: Build Kernel with KernelSU-Next

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: Checkout kernel source
      uses: actions/checkout@v4
      with:
        path: kernel-source
        
    - name: Install KernelSU-Next
      working-directory: kernel-source
      run: |
        curl -LSs "https://raw.githubusercontent.com/rifsxd/KernelSU-Next/next/kernel/setup.sh" | bash -
        
    - name: Setup Clang (Neutrino)
      run: |
        mkdir -p clang
        cd clang
        wget -q https://gitlab.com/Neutrino-Project/snapdragon-clang/-/raw/16/neutrino-clang-16.0.6-20231109.tar.zst?inline=false -O clang.tar.zst
        tar -xf clang.tar.zst
        
    - name: Setup GCC (AOSP)
      run: |
        git clone --depth=1 https://gitlab.com/Neutrino-Project/gcc-aarch64.git gcc
        
    - name: Configure and build kernel
      working-directory: kernel-source
      run: |
        export PATH=$GITHUB_WORKSPACE/clang/bin:$GITHUB_WORKSPACE/gcc/bin:$PATH
        export ARCH=arm64
        export CROSS_COMPILE=aarch64-linux-android-
        export CC=clang
        export CLANG_TRIPLE=aarch64-linux-gnu-
        make a32_defconfig
        make -j$(nproc)
        
    - name: Upload kernel image
      uses: actions/upload-artifact@v4
      with:
        name: kernel-image
        path: kernel-source/arch/arm64/boot/Image.gz
